name: Release

# Trigger: push a tag like v0.2.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  # ── macOS ──────────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Prepare signing certificate
        id: cert
        run: |
          echo "$CSC_LINK_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          echo "path=$RUNNER_TEMP/cert.p12" >> "$GITHUB_OUTPUT"
        env:
          CSC_LINK_BASE64: ${{ secrets.CSC_LINK }}

      - name: Build & package (macOS)
        run: pnpm run package -- --mac --publish never
        env:
          CSC_LINK: ${{ steps.cert.outputs.path }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_NAME: ${{ secrets.CSC_NAME }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Clean up certificate
        if: always()
        run: rm -f "$RUNNER_TEMP/cert.p12"

      - name: Upload macOS artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ── Windows ────────────────────────────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build & package (Windows)
        run: pnpm run package -- --win --publish never

      - name: Upload Windows artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build & package (Linux)
        run: pnpm run package -- --linux --publish never

      - name: Upload Linux artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.AppImage
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
