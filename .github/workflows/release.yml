name: Release

# Trigger: push a tag like v0.2.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  # ── macOS ──────────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & package (macOS)
        run: npm run package -- --mac --publish never
        env:
          # Disable code signing — remove these two lines if you add a cert
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ''

      - name: Upload macOS artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ── Windows ────────────────────────────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & package (Windows)
        run: npm run package -- --win --publish never

      - name: Upload Windows artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & package (Linux)
        run: npm run package -- --linux --publish never

      - name: Upload Linux artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.AppImage
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
