<svg width="1024" height="1024" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="4" y1="4" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0b429" />
      <stop offset="100%" stop-color="#d99e22" />
    </linearGradient>
    <clipPath id="squircle">
      <rect x="2" y="2" width="36" height="36" rx="8" ry="8" />
    </clipPath>
  </defs>

  <!-- Squircle background with moderate padding for app icon contexts -->
  <rect x="2" y="2" width="36" height="36" rx="8" ry="8" fill="url(#bg)" />

  <!-- Face elements clipped to squircle -->
  <g clip-path="url(#squircle)">
    <!-- Eyes -->
    <circle cx="14.375" cy="15.5" r="3.15" fill="white" />
    <circle cx="25.625" cy="15.5" r="3.15" fill="white" />

    <!-- Smile arc -->
    <path d="M10.4375,22.25 Q20,31.25 29.5625,22.25"
          stroke="white" stroke-width="3.6" stroke-linecap="round" fill="none" />

    <!-- Stem from smile center -->
    <rect x="18.3125" y="27.3125" width="3.375" height="6.1875" rx="1.6875" fill="white" />
  </g>
</svg>
